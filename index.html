<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catering · Gestión operativa</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="app">

    <!-- TOPBAR -->
    <header class="topbar">
      <div class="topbar-left">
        <span class="logo">Catering</span>
        <span class="topbar-date" id="currentDate"></span>
      </div>
      <nav class="tabs" id="mainTabs">
        <button class="tab active" data-view="today">Hoy</button>
        <button class="tab" data-view="week">Semana</button>
        <button class="tab" data-view="month">Mes</button>
        <button class="tab" data-view="cumulative">Acumulado</button>
      </nav>
      <div class="topbar-actions">
        <button class="btn-action" id="btnImport">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Importar CSV
        </button>
        <button class="btn-action" id="btnAdd">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Añadir
        </button>
      </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="main" id="mainContent">
      <div class="loading-state" id="loadingState">
        <div class="spinner"></div>
        <span>Cargando pedidos…</span>
      </div>
    </main>

  </div>

  <!-- IMPORT MODAL -->
  <div class="modal-overlay" id="importModal" hidden>
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title">Importar CSV</h2>
        <button class="modal-close" id="closeImport">✕</button>
      </div>
      <div class="modal-body">
        <div class="drop-zone" id="dropZone">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          <p>Arrastrá el CSV aquí o <label class="file-link" for="fileInput">seleccioná el archivo</label></p>
          <p class="drop-hint">Exportación directa del sistema de catering</p>
          <input type="file" id="fileInput" accept=".csv" hidden />
        </div>
        <div class="import-preview" id="importPreview" hidden>
          <div class="import-summary" id="importSummary"></div>
          <div class="import-new-list" id="importNewList"></div>
          <button class="btn-primary" id="btnConfirmImport">Confirmar importación</button>
        </div>
        <div class="import-progress" id="importProgress" hidden>
          <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
          <span id="progressText">Procesando…</span>
        </div>
      </div>
    </div>
  </div>

  <!-- ADD MANUAL MODAL -->
  <div class="modal-overlay" id="addModal" hidden>
    <div class="modal modal-wide">
      <div class="modal-header">
        <h2 class="modal-title">Añadir pedido manual</h2>
        <button class="modal-close" id="closeAdd">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-grid">
          <div class="form-group">
            <label>Nombre cliente</label>
            <input type="text" id="fName" placeholder="Nombre completo" />
          </div>
          <div class="form-group">
            <label>Empresa</label>
            <input type="text" id="fCompany" placeholder="Empresa" />
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="fEmail" placeholder="email@empresa.com" />
          </div>
          <div class="form-group">
            <label>Teléfono</label>
            <input type="text" id="fPhone" placeholder="6XX XXX XXX" />
          </div>
          <div class="form-group">
            <label>Edificio</label>
            <input type="text" id="fBuilding" placeholder="Edificio 1" />
          </div>
          <div class="form-group">
            <label>Planta y sala</label>
            <input type="text" id="fRoom" placeholder="Planta 0 · Sala Sebares" />
          </div>
          <div class="form-group">
            <label>Fecha entrega</label>
            <input type="datetime-local" id="fDelivery" />
          </div>
          <div class="form-group">
            <label>Hora desmontaje</label>
            <input type="time" id="fTeardown" />
          </div>
          <div class="form-group">
            <label>Pax</label>
            <input type="number" id="fPax" placeholder="0" min="1" />
          </div>
          <div class="form-group">
            <label>Tipo de catering</label>
            <select id="fType">
              <option value="">Seleccionar…</option>
              <option>A la carta Desayunos</option>
              <option>Coffee Break</option>
              <option>Finger Lunch</option>
              <option>A la carta Comidas</option>
              <option>Cóctel</option>
              <option>Otros</option>
            </select>
          </div>
          <div class="form-group form-group-full">
            <label>Comentario usuario</label>
            <textarea id="fComment" rows="2" placeholder="Indicaciones especiales…"></textarea>
          </div>
          <div class="form-group form-group-full">
            <label>Comentario interno</label>
            <textarea id="fInternal" rows="2" placeholder="Notas del equipo…"></textarea>
          </div>
        </div>
        <button class="btn-primary" id="btnSaveManual">Guardar pedido</button>
      </div>
    </div>
  </div>

  <!-- Firebase SDKs -->
  <script type="module" src="js/firebase.js"></script>
  <script type="module" src="js/importer.js"></script>
  <script type="module" src="js/dashboard.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
