<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catering · Gestión operativa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
:root{
  --bg:#F7F6F3;--bg-card:#FFFFFF;--bg-hover:#F0EFEb;--border:#E4E2DC;--border-soft:#EDEBE6;
  --text-primary:#1A1915;--text-secondary:#6B6860;--text-tertiary:#9E9B93;
  --coffee-bg:#FEF3E2;--coffee-fg:#7A4410;--lunch-bg:#E8F5EE;--lunch-fg:#1A5C38;
  --break-bg:#E8F0FC;--break-fg:#1E3A7A;--other-bg:#EDEBE6;--other-fg:#4A4840;
  --ok-bg:#EBF5E0;--ok-fg:#2D6A0A;--cancel-bg:#FDEDED;--cancel-fg:#8B1F1F;
  --pending-bg:#FEF3E2;--pending-fg:#7A4410;
  --alert-red-bg:#FDEDED;--alert-red-border:#F5A5A5;--alert-red-fg:#7A1F1F;
  --alert-amber-bg:#FEF3E2;--alert-amber-border:#FAC97A;--alert-amber-fg:#7A4410;
  --alert-purple-bg:#F3E8FD;--alert-purple-border:#C9A0F5;--alert-purple-fg:#5B2E8C;
  --radius-sm:4px;--radius-md:8px;--radius-lg:12px;
  --font-sans:'Inter',system-ui,sans-serif;--font-mono:'JetBrains Mono',monospace;
}
.dark{
  --bg:#141412;--bg-card:#1E1D1B;--bg-hover:#2A2926;--border:#333230;--border-soft:#2A2926;
  --text-primary:#F0EDE8;--text-secondary:#9E9B93;--text-tertiary:#6B6860;
  --coffee-bg:#2A1F0E;--coffee-fg:#FAC97A;--lunch-bg:#0E2018;--lunch-fg:#6DBF95;
  --break-bg:#0E1828;--break-fg:#7AAFF5;--other-bg:#222220;--other-fg:#C8C5BC;
  --ok-bg:#122008;--ok-fg:#8FD455;--cancel-bg:#220E0E;--cancel-fg:#F5A5A5;
  --pending-bg:#2A1F0E;--pending-fg:#FAC97A;
  --alert-red-bg:#220E0E;--alert-red-border:#8B3030;--alert-red-fg:#F5A5A5;
  --alert-amber-bg:#2A1F0E;--alert-amber-border:#8B6020;--alert-amber-fg:#FAC97A;
  --alert-purple-bg:#241A30;--alert-purple-border:#7A4FA8;--alert-purple-fg:#D9BBF5;
}
.btn-theme{background:none;border:1px solid var(--border);border-radius:var(--radius-md);padding:6px 10px;cursor:pointer;font-size:15px;color:var(--text-secondary);transition:all .15s}
.btn-theme:hover{border-color:var(--text-primary);color:var(--text-primary)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:var(--bg);color:var(--text-primary);font-size:14px;line-height:1.5;min-height:100vh}
.topbar{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:16px;padding:0 24px;height:52px}
.topbar-left{display:flex;align-items:baseline;gap:12px}
.logo{font-size:15px;font-weight:600;letter-spacing:-.02em;color:var(--text-primary)}
.topbar-date{font-size:12px;color:var(--text-tertiary);font-family:var(--font-mono)}
.tabs{display:flex;gap:2px}
.tab{font-size:13px;font-family:var(--font-sans);padding:5px 14px;border-radius:var(--radius-md);border:none;background:transparent;color:var(--text-secondary);cursor:pointer;transition:background .15s,color .15s}
.tab:hover{background:var(--bg-hover);color:var(--text-primary)}
.tab.active{background:var(--text-primary);color:#fff}
.topbar-actions{display:flex;gap:8px}
.date-nav{display:flex;align-items:center;gap:6px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-md);padding:4px 8px}
.date-nav-btn{background:none;border:none;cursor:pointer;color:var(--text-secondary);font-size:16px;padding:0 4px;line-height:1;border-radius:var(--radius-sm)}
.date-nav-btn:hover{background:var(--bg-hover);color:var(--text-primary)}
.date-nav-label{font-size:12px;color:var(--text-primary);font-family:var(--font-mono);cursor:pointer;min-width:90px;text-align:center}
.date-nav input[type=date]{position:fixed;opacity:0;pointer-events:none;width:0;height:0;top:-9999px;left:-9999px}
.btn-action{display:flex;align-items:center;gap:6px;font-size:13px;font-family:var(--font-sans);padding:6px 14px;border-radius:var(--radius-md);border:1px solid var(--border);background:var(--bg-card);color:var(--text-secondary);cursor:pointer;transition:all .15s}
.btn-action:hover{border-color:var(--text-primary);color:var(--text-primary)}
.main{max-width:1100px;margin:0 auto;padding:24px}
.loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:80px;color:var(--text-tertiary);font-size:13px}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--text-primary);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.kpi-card{background:var(--bg-card);border:1px solid var(--border-soft);border-radius:var(--radius-lg);padding:14px 16px}
.kpi-label{font-size:11px;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.kpi-value{font-size:26px;font-weight:600;line-height:1;font-family:var(--font-mono)}
.kpi-sub{font-size:11px;color:var(--text-tertiary);margin-top:4px}
.kpi-value.warn{color:#C45A00}.kpi-value.alert{color:#8B1F1F}
.alerts{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.alert{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-radius:var(--radius-md);font-size:12.5px;border:1px solid}
.alert svg{flex-shrink:0;margin-top:1px}
.alert-red{background:var(--alert-red-bg);border-color:var(--alert-red-border);color:var(--alert-red-fg)}
.alert-amber{background:var(--alert-amber-bg);border-color:var(--alert-amber-border);color:var(--alert-amber-fg)}
.alert-purple{background:var(--alert-purple-bg);border-color:var(--alert-purple-border);color:var(--alert-purple-fg)}
.alert-new{background:var(--ok-bg);border-color:#A3D977;color:#2D6A0A}
.section-label{font-size:11px;font-weight:500;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.08em;margin:0 0 8px}
.timeline-wrap{background:var(--bg-card);border:1px solid var(--border-soft);border-radius:var(--radius-lg);padding:16px;margin-bottom:16px;overflow-x:auto}
.tl-axis{display:flex;border-top:1px solid var(--border);padding-top:6px;margin-top:8px}
.tl-hour{font-size:10px;color:var(--text-tertiary);font-family:var(--font-mono);text-align:left;white-space:nowrap}
.tl-rows{display:flex;flex-direction:column;gap:5px;padding-bottom:4px}
.tl-row{display:flex;align-items:center;gap:8px;font-size:12px}
.tl-time{font-family:var(--font-mono);font-size:11px;color:var(--text-tertiary);width:40px;flex-shrink:0}
.tl-track{flex:1;position:relative;height:28px}
.tl-bar{position:absolute;height:100%;border-radius:var(--radius-sm);display:flex;align-items:center;padding:0 10px;font-size:11.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:default;transition:opacity .15s;min-width:80px}
.tl-bar:hover{opacity:.85}
.tl-bar.coffee{background:var(--coffee-bg);color:var(--coffee-fg)}
.tl-bar.lunch{background:var(--lunch-bg);color:var(--lunch-fg)}
.tl-bar.break{background:var(--break-bg);color:var(--break-fg)}
.tl-bar.other{background:var(--other-bg);color:var(--other-fg)}
.tl-bar.cancelled{opacity:.35}
.tl-bar.overlap{outline:1.5px solid var(--alert-red-border)}
.orders{display:flex;flex-direction:column;gap:8px}
.order-card{background:var(--bg-card);border:1px solid var(--border-soft);border-radius:var(--radius-lg);padding:14px 16px;transition:border-color .15s}
.order-card:hover{border-color:var(--border)}
.order-card.has-comment{border-left:3px solid #F5A940}
.order-card.cancelled{opacity:.5}
.order-card.is-new{border-left:3px solid #6DBF40}
.order-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:8px}
.order-who{display:flex;flex-direction:column;gap:2px}
.order-name{font-size:13.5px;font-weight:500}
.order-loc{font-size:12px;color:var(--text-secondary)}
.order-pills{display:flex;gap:6px;align-items:center;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
.pill{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:500;white-space:nowrap}
.pill-coffee{background:var(--coffee-bg);color:var(--coffee-fg)}
.pill-lunch{background:var(--lunch-bg);color:var(--lunch-fg)}
.pill-break{background:var(--break-bg);color:var(--break-fg)}
.pill-other{background:var(--other-bg);color:var(--other-fg)}
.pill-ok{background:var(--ok-bg);color:var(--ok-fg)}
.pill-cancel{background:var(--cancel-bg);color:var(--cancel-fg)}
.pill-pending{background:var(--pending-bg);color:var(--pending-fg)}
.pill-pax-red{background:var(--alert-red-bg);color:var(--alert-red-fg)}
.pill-pax-amber{background:var(--alert-amber-bg);color:var(--alert-amber-fg)}
.pill-new{background:var(--ok-bg);color:var(--ok-fg)}
.pill-overlap{background:var(--alert-red-bg);color:var(--alert-red-fg)}
.order-meta{display:flex;align-items:center;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--text-secondary)}
.meta-item{display:flex;align-items:center;gap:4px}
.photo-dot{display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--text-tertiary)}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot-yes{background:#5DA832}.dot-no{background:#C8C5BC}
.comment-box{margin-top:10px;font-size:12px;color:#7A4410;background:var(--coffee-bg);border-radius:var(--radius-sm);padding:8px 12px;display:flex;gap:8px}
.comment-internal{margin-top:6px;font-size:12px;color:var(--text-secondary);background:var(--bg);border-radius:var(--radius-sm);padding:8px 12px;display:flex;gap:8px;font-style:italic}
.period-grid{display:grid;gap:10px}
.period-day{background:var(--bg-card);border:1px solid var(--border-soft);border-radius:var(--radius-lg);overflow:hidden}
.period-day-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border-soft);cursor:pointer}
.period-day-header:hover{background:var(--bg-hover)}
.period-day-title{font-size:13px;font-weight:500}
.period-day-meta{font-size:12px;color:var(--text-tertiary);display:flex;gap:12px}
.period-day-body{padding:10px 16px;display:flex;flex-direction:column;gap:6px}
.period-day-body.collapsed{display:none}
.cumulative-controls{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.range-select{font-family:var(--font-sans);font-size:12.5px;padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius-md);background:var(--bg-card);color:var(--text-primary);cursor:pointer}
.range-inputs{display:flex;align-items:center;gap:6px}
.range-inputs input[type=date]{font-family:var(--font-sans);font-size:12.5px;padding:6px 8px;border:1px solid var(--border);border-radius:var(--radius-md);background:var(--bg-card);color:var(--text-primary)}
.range-compare-toggle{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--text-secondary);cursor:pointer}
.compare-badge{font-size:11px;padding:2px 8px;border-radius:12px;font-weight:500}
.compare-up{background:var(--ok-bg);color:var(--ok-fg)}
.compare-down{background:var(--alert-red-bg);color:var(--alert-red-fg)}
.compare-flat{background:var(--other-bg);color:var(--other-fg)}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:20px}
.stat-card{background:var(--bg-card);border:1px solid var(--border-soft);border-radius:var(--radius-lg);padding:16px}
.stat-card h3{font-size:12px;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}
.bar-chart{display:flex;flex-direction:column;gap:8px}
.bar-row{display:flex;align-items:center;gap:10px;font-size:12px}
.bar-label{width:130px;flex-shrink:0;color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-fill-wrap{flex:1;background:var(--bg);border-radius:3px;height:8px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;background:var(--text-primary);transition:width .4s ease}
.bar-val{width:60px;text-align:right;color:var(--text-secondary);font-family:var(--font-mono);font-size:11px}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-tertiary)}
.empty-state p{font-size:13px;margin-top:8px}
.logic-section{background:var(--bg-card);border:1px solid var(--border-soft);border-radius:var(--radius-lg);padding:20px;margin-bottom:14px}
.logic-section h3{font-size:14px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.logic-section p{font-size:13px;color:var(--text-secondary);line-height:1.6;margin-bottom:8px}
.logic-rule{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-top:1px solid var(--border-soft)}
.logic-rule:first-of-type{border-top:none}
.logic-rule-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
.logic-rule-text{font-size:12.5px;color:var(--text-secondary);line-height:1.5}
.logic-rule-text strong{color:var(--text-primary);font-weight:500}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
.modal-overlay[hidden]{display:none}
.modal{background:var(--bg-card);border-radius:var(--radius-lg);border:1px solid var(--border);width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.12)}
.modal-wide{max-width:680px}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--border-soft)}
.modal-title{font-size:15px;font-weight:600}
.modal-close{background:none;border:none;cursor:pointer;color:var(--text-tertiary);font-size:16px;line-height:1;padding:4px 8px;border-radius:var(--radius-sm)}
.modal-close:hover{background:var(--bg-hover);color:var(--text-primary)}
.modal-body{padding:20px}
.drop-zone{border:2px dashed var(--border);border-radius:var(--radius-lg);padding:40px 20px;text-align:center;color:var(--text-secondary);transition:border-color .15s,background .15s;cursor:default}
.drop-zone.dragover{border-color:var(--text-primary);background:var(--bg)}
.drop-zone svg{color:var(--text-tertiary);margin-bottom:12px}
.drop-zone p{font-size:13px;margin-bottom:4px}
.drop-hint{font-size:12px;color:var(--text-tertiary)!important}
.file-link{color:var(--text-primary);text-decoration:underline;cursor:pointer}
.import-summary{background:var(--bg);border-radius:var(--radius-md);padding:12px 16px;font-size:13px;margin-bottom:12px;line-height:1.8}
.import-new-list{max-height:200px;overflow-y:auto;margin-bottom:16px;display:flex;flex-direction:column;gap:4px}
.import-new-item{font-size:12px;padding:6px 10px;background:var(--ok-bg);border-radius:var(--radius-sm);color:var(--ok-fg);display:flex;justify-content:space-between}
.import-progress{text-align:center;padding:20px 0}
.progress-bar{background:var(--bg);border-radius:4px;height:6px;margin-bottom:10px;overflow:hidden}
.progress-fill{height:100%;background:var(--text-primary);border-radius:4px;transition:width .3s}
#progressText{font-size:12px;color:var(--text-secondary)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group-full{grid-column:1/-1}
.form-group label{font-size:12px;color:var(--text-secondary);font-weight:500}
.form-group input,.form-group select,.form-group textarea{font-family:var(--font-sans);font-size:13px;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-md);background:var(--bg);color:var(--text-primary);outline:none;transition:border-color .15s;resize:vertical}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--text-primary);background:#fff}
.btn-primary{width:100%;padding:10px;background:var(--text-primary);color:#fff;border:none;border-radius:var(--radius-md);font-size:13px;font-weight:500;font-family:var(--font-sans);cursor:pointer;transition:opacity .15s}
.btn-primary:hover{opacity:.85}
.btn-primary:disabled{opacity:.45;cursor:default}
@media(max-width:768px){.topbar{flex-wrap:wrap;height:auto;padding:10px 16px;gap:10px}.tabs{order:3;width:100%;overflow-x:auto}.kpi-grid{grid-template-columns:repeat(2,1fr)}.form-grid{grid-template-columns:1fr}.stats-grid{grid-template-columns:1fr}.main{padding:16px}}
  </style>
</head>
<body>
<div id="app">
  <header class="topbar">
    <div class="topbar-left">
      <span class="logo">Catering</span>
      <span class="topbar-date" id="currentDate"></span>
      <span class="topbar-date" id="lastImportLabel" style="color:var(--text-tertiary)"></span>
    </div>
    <nav class="tabs" id="mainTabs">
      <button class="tab active" data-view="today">Hoy</button>
      <button class="tab" data-view="week">Semana</button>
      <button class="tab" data-view="month">Mes</button>
      <button class="tab" data-view="cumulative">Acumulado</button>
      <button class="tab" data-view="logic">Cómo funciona</button>
    </nav>
    <div class="topbar-actions">
      <div class="date-nav" id="dateNav">
        <button class="date-nav-btn" id="btnPrev">◀</button>
        <span class="date-nav-label" id="dateNavLabel" title="Haz clic para ir a una fecha">hoy</span>
        <input type="date" id="datePickerInput" />
        <button class="date-nav-btn" id="btnNext">▶</button>
      </div>
      <button class="btn-theme" id="btnTheme" title="Modo noche">🌙</button>
      <button class="btn-action" id="btnImport">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Importar CSV
      </button>
    </div>
  </header>
  <main class="main" id="mainContent">
    <div class="loading-state" id="loadingState">
      <div class="spinner"></div>
      <span>Cargando pedidos…</span>
    </div>
  </main>
</div>

<!-- MODAL IMPORTAR -->
<div class="modal-overlay" id="importModal" hidden>
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title">Importar CSV</h2>
      <button class="modal-close" id="closeImport">✕</button>
    </div>
    <div class="modal-body">
      <div class="drop-zone" id="dropZone">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <p>Arrastra el CSV aquí o <label class="file-link" for="fileInput">selecciona el archivo</label></p>
        <p class="drop-hint">Exportación directa del sistema de catering</p>
        <input type="file" id="fileInput" accept=".csv" hidden />
      </div>
      <div class="import-preview" id="importPreview" hidden>
        <div class="import-summary" id="importSummary"></div>
        <div class="import-new-list" id="importNewList"></div>
        <button class="btn-primary" id="btnConfirmImport">Confirmar importación</button>
      </div>
      <div class="import-progress" id="importProgress" hidden>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <span id="progressText">Procesando…</span>
      </div>
    </div>
  </div>
</div>

<!-- MODAL AÑADIR -->
<div class="modal-overlay" id="addModal" hidden>
  <div class="modal modal-wide">
    <div class="modal-header">
      <h2 class="modal-title">Añadir pedido manual</h2>
      <button class="modal-close" id="closeAdd">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group"><label>Nombre cliente</label><input type="text" id="fName" placeholder="Nombre completo" /></div>
        <div class="form-group"><label>Empresa</label><input type="text" id="fCompany" placeholder="Empresa" /></div>
        <div class="form-group"><label>Email</label><input type="email" id="fEmail" placeholder="email@empresa.com" /></div>
        <div class="form-group"><label>Teléfono</label><input type="text" id="fPhone" placeholder="6XX XXX XXX" /></div>
        <div class="form-group"><label>Edificio</label><input type="text" id="fBuilding" placeholder="Edificio 1" /></div>
        <div class="form-group"><label>Planta y sala</label><input type="text" id="fRoom" placeholder="Planta 0 · Sala Sebares" /></div>
        <div class="form-group"><label>Fecha y hora de entrega</label><input type="datetime-local" id="fDelivery" /></div>

<script type="module">

import { getFirestore, collection, doc, setDoc, getDocs, getDoc, query, orderBy, Timestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

async function saveOrder(order) {
  await setDoc(doc(db,'catering_orders',order.orderId),{...order,updatedAt:Timestamp.now()},{merge:true});
}
async function getOrders({from,to}={}) {
  const col = collection(db,'catering_orders');
  const q=query(col,orderBy('updatedAt','asc'));
  const snap=await getDocs(q);
  const all=snap.docs.map(d=>({id:d.id,...d.data()}));
  if(!from||!to)return all;
  return all.filter(o=>{
    const d=toDate(o.deliveryAt);
    return d&&d>=from&&d<=to;
  });

async function getExistingOrderIds() {
  const snap=await getDocs(collection(db,'catering_orders'));
  return new Set(snap.docs.map(d=>d.id));
}
async function getConfig() {
  try{
    const snap=await getDoc(doc(db,'catering_config','settings'));
    return snap.exists()?snap.data():{paxAlertIndividual:35,paxAlertHigh:50,paxAlertDayTotal:100,minGapMinutes:20,serviceCountAlert:15};
  }catch(e){return {paxAlertIndividual:35,paxAlertHigh:50,paxAlertDayTotal:100,minGapMinutes:20,serviceCountAlert:15};}
}

// ── HELPERS ───────────────────────────────────────────────────────
function toDate(ts){if(!ts)return null;if(ts instanceof Date)return ts;if(ts.seconds)return new Date(ts.seconds*1000);return new Date(ts);}
function localISODate(d){const y=d.getFullYear();const m=String(d.getMonth()+1).padStart(2,'0');const day=String(d.getDate()).padStart(2,'0');return`${y}-${m}-${day}`;}
function fmtTime(ts){const d=toDate(ts);if(!d)return'--';return d.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});}
function fmtDateShort(ts){const d=toDate(ts);if(!d)return'--';return d.toLocaleDateString('es-ES',{weekday:'short',day:'numeric',month:'short'});}
function fmtMoney(n){return n?n.toLocaleString('es-ES',{minimumFractionDigits:0,maximumFractionDigits:0})+'€':'—';}
function startOfDay(d){const r=new Date(d);r.setHours(0,0,0,0);return r;}
function endOfDay(d){const r=new Date(d);r.setHours(23,59,59,999);return r;}
function startOfWeek(d){const r=new Date(d);const day=r.getDay();r.setDate(r.getDate()-(day===0?6:day-1));r.setHours(0,0,0,0);return r;}
function endOfWeek(d){const r=startOfWeek(d);r.setDate(r.getDate()+6);r.setHours(23,59,59,999);return r;}
function startOfMonth(d){return new Date(d.getFullYear(),d.getMonth(),1);}
function endOfMonth(d){return new Date(d.getFullYear(),d.getMonth()+1,0,23,59,59,999);}

function typeClass(o){const c=o.cateringCategory||'other';return c;}
function typePill(o){const cls=typeClass(o);return`<span class="pill pill-${cls}">${o.cateringType||'Otros'}</span>`;}
function statusPill(o){const s=o.orderStatus||'';if(s==='CANCELADO')return`<span class="pill pill-cancel">Cancelado</span>`;if(s==='ENTREGADO'||s==='CONFIRMADO')return`<span class="pill pill-ok">${s==='ENTREGADO'?'Entregado':'Confirmado'}</span>`;return`<span class="pill pill-pending">Pendiente</span>`;}

// ── IMPORTER ──────────────────────────────────────────────────────
function parseCSV(text){
  const lines=text.trim().split('\n').map(l=>l.trim()).filter(Boolean);
  if(lines.length<2)throw new Error('CSV vacío');
  const sep=lines[0].includes(';')?';':',';
  const rawHeaders=lines[0].split(sep).map(h=>h.replace(/"/g,'').trim().toLowerCase());
  const rows=[];
  for(let i=1;i<lines.length;i++){
    const cells=splitLine(lines[i],sep);
    if(cells.every(c=>!c.trim()))continue;
    const raw={};
    rawHeaders.forEach((h,idx)=>{raw[h]=cells[idx]?.replace(/"/g,'').trim()??'';});
    const order=mapRow(raw);
    if(order)rows.push(order);
  }
  return rows;
}
function splitLine(line,sep){
  const result=[];let current='';let inQ=false;
  for(const ch of line){if(ch==='"'){inQ=!inQ;continue;}if(ch===sep&&!inQ){result.push(current);current='';continue;}current+=ch;}
  result.push(current);return result;
}
function mapRow(raw){
  const orderId=raw['id de pedido']||'';
  if(!orderId)return null;
  const deliveryAt=parseDate(raw['fecha entrega / hora']||raw['fecha entrega']||'');
  const {building,floor,room}=parseBR(raw['edificio y sala']||'');
  const pax=parseInt(raw['cantidad personas']||'0',10)||0;
  const priceFood=parseFloat((raw['importe alimentos']||raw['precio alimentos']||'0').replace(',','.'))||0;
  const priceDrinks=parseFloat((raw['importe de bebidas']||raw['precio bebidas']||'0').replace(',','.'))||0;
  const priceTransport=parseFloat((raw['importe de transporte y servicio']||raw['precio transporte']||'0').replace(',','.'))||0;
  const priceStaff=parseFloat((raw['importe de camareros']||raw['precio camareros']||'0').replace(',','.'))||0;
  const priceTotal=parseFloat((raw['total importe sin iva']||raw['precio total sin iva']||'0').replace(',','.'))||0;
  const hasDeliveryPhoto=!!(raw['fecha de la imagen de entrega']&&raw['fecha de la imagen de entrega']!=='--'&&raw['fecha de la imagen de entrega'].trim());
  const hasPickupPhoto=!!(raw['fecha de la imagen de recogida']&&raw['fecha de la imagen de recogida']!=='--'&&raw['fecha de la imagen de recogida'].trim());
  const isLate=(raw['tarde?']||'').toLowerCase().startsWith('s');
  const lateMinutes=parseInt(raw['cuanto de tarde']||'0',10)||0;
  const orderStatus=normalizeStatus(raw['estado pedido']||'');
  const createdAt=parseDate(raw['fecha de creación']||raw['fecha de creacion']||'');
  const costCenter=raw['centro de coste / departamento']||raw['centro de coste']||'';
  return{
    orderId:orderId.trim(),customerId:raw['id']||'',center:raw['centro']||'',
    buildingRoom:raw['edificio y sala']||'',building,floor,room,
    customerName:raw['customer']||'',company:raw['empresa']||'',
    email:raw['email']||'',phone:raw['teléfono catering']||'',
    deliveryAt:deliveryAt?Timestamp.fromDate(deliveryAt):null,
    deliveryAtISO:deliveryAt?deliveryAt.toISOString():null,
    setupTime:raw['hora de montaje']||'',startTime:raw['hora de inicio']||'',
    teardownTime:raw['hora de desmontaje']||'',
    pickupTime:raw['hora de recogida']||'',pax,
    cateringType:raw['tipo de catering']||'',
    cateringCategory:categorizeCatering(raw['tipo de catering']||''),
    orderStatus,statusCode:raw['estado']||'',
    userComment:raw['comentario usuario']||'',internalComment:raw['comentario interno']||'',
    billingNotes:raw['notas internas facturacion']||raw['notas internas de facturación']||'',
    hasDeliveryPhoto,hasPickupPhoto,isLate,lateMinutes,
    costCenter,department:raw['departamento']||'',
    priceFood,priceDrinks,priceTransport,priceStaff,priceTotal,
    isManual:false,source:'csv',
    createdAt:createdAt?Timestamp.fromDate(createdAt):null,
  };
}
function parseDate(str){
  if(!str||str==='--'||str==='null')return null;
  str=str.replace(/"/g,'').trim();
  // Format: YYYY-MM-DD HH:MM:SS
  let m=str.match(/^(\d{4})-(\d{2})-(\d{2})\s*(\d{1,2}):(\d{2})(?::(\d{2}))?/);
  if(m){const[,y,mo,d,h,mi,s]=m;const date=new Date(+y,+mo-1,+d,+h,+mi,+(s||0));return isNaN(date.getTime())?null:date;}
  // Format: DD/MM/YYYY HH:MM:SS
  m=str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})\s*(\d{1,2}):(\d{2})(?::(\d{2}))?/);
  if(m){const[,d,mo,y,h,mi,s]=m;const date=new Date(+y,+mo-1,+d,+h,+mi,+(s||0));return isNaN(date.getTime())?null:date;}
  return null;
}
function parseBR(str){
  if(!str)return{building:'',floor:'',room:''};
  const parts=str.split('-').map(s=>s.trim());
  let building='',floor='',room='';
  parts.forEach(p=>{if(/planta/i.test(p))floor=p;else if(/sala/i.test(p))room=p.replace(/sala\s*/i,'').trim();else building=p;});
  return{building,floor,room};
}
function normalizeStatus(raw){
  const r=raw.toLowerCase();
  if(r.includes('cancel'))return'CANCELADO';
  if(r.includes('entregado')||r.includes('completado'))return'ENTREGADO';
  if(r.includes('empresa')||r.includes('pago'))return'CONFIRMADO';
  if(r.includes('pendiente'))return'PENDIENTE';
  return raw||'PENDIENTE';
}
function categorizeCatering(type){
  const t=type.toLowerCase();
  if(t.includes('desayuno')||t.includes('coffee')||t.includes('break'))return'coffee';
  if(t.includes('comida')||t.includes('lunch')||t.includes('finger')||t.includes('carta'))return'lunch';
  return'other';
}

// ── DASHBOARD ─────────────────────────────────────────────────────
const ICON_WARN=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`;
const ICON_INFO=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`;
const ICON_OK=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>`;

function buildAlerts(orders,config){
  const alerts=[];
  const active=orders.filter(o=>o.orderStatus!=='CANCELADO');
  const newOnes=active.filter(o=>o.isNew&&!o.reviewed);
  if(newOnes.length>0)alerts.push({type:'new',msg:`${newOnes.length} pedido${newOnes.length>1?'s':''} nuevo${newOnes.length>1?'s':''} en esta importación`});

  // Alertas individuales por pax (montaje / refuerzo puntual)
  active.forEach(o=>{
    if(o.pax>=config.paxAlertHigh)alerts.push({type:'red',msg:`Montaje grande · ${o.customerName} (${fmtTime(o.deliveryAt)}) — ${o.pax} pax · valorar 2 personas para el montaje`});
    else if(o.pax>=config.paxAlertIndividual)alerts.push({type:'amber',msg:`Volumen elevado · ${o.customerName} (${fmtTime(o.deliveryAt)}) — ${o.pax} pax`});
  });

  // Carga total del día por pax acumulados
  const totalPax=active.reduce((s,o)=>s+(o.pax||0),0);
  if(totalPax>=config.paxAlertDayTotal)alerts.push({type:'red',msg:`Producción total del día: ${totalPax} pax — carga elevada acumulada`});

  // Carga total del día por NÚMERO de servicios (aunque sean pequeños)
  const serviceThreshold=config.serviceCountAlert||15;
  if(active.length>=serviceThreshold)alerts.push({type:'red',msg:`${active.length} servicios hoy — volumen alto de pedidos, aunque sean pequeños, valorar refuerzo de personal`});

  // Solapamientos — comparamos por SALA (campo fiable), ignorando edificio que suele venir vacío
  const byRoom={};
  active.forEach(o=>{
    const roomKey=(o.room||o.buildingRoom||'').toLowerCase().trim();
    if(!roomKey)return;
    if(!byRoom[roomKey])byRoom[roomKey]=[];
    byRoom[roomKey].push(o);
  });
  Object.entries(byRoom).forEach(([,group])=>{
    if(group.length<2)return;
    for(let i=0;i<group.length;i++){for(let j=i+1;j<group.length;j++){
      const a=group[i],b=group[j];
      const aS=toDate(a.deliveryAt),bS=toDate(b.deliveryAt);
      if(aS&&bS&&Math.abs(aS-bS)<60*60*1000){
        const loc=a.room?`sala ${a.room}`:a.buildingRoom;
        alerts.push({type:'red',msg:`Solapamiento · ${fmtTime(a.deliveryAt)} — ${a.customerName} y ${b.customerName} en ${loc}`});
      }
    }}
  });

  // Entregas muy próximas entre sí (aunque sean en salas/edificios distintos) — puede requerir el mismo personal
  const minGap=(config.minGapMinutes||20)*60*1000;
  const sortedByTime=active.filter(o=>toDate(o.deliveryAt)).sort((a,b)=>toDate(a.deliveryAt)-toDate(b.deliveryAt));
  const flaggedPairs=new Set();
  for(let i=0;i<sortedByTime.length-1;i++){
    const a=sortedByTime[i],b=sortedByTime[i+1];
    const aRoom=(a.room||a.buildingRoom||'').toLowerCase().trim();
    const bRoom=(b.room||b.buildingRoom||'').toLowerCase().trim();
    if(aRoom&&aRoom===bRoom)continue; // eso ya es solapamiento, no proximidad
    const gap=toDate(b.deliveryAt)-toDate(a.deliveryAt);
    if(gap>=0&&gap<minGap){
      const key=`${a.orderId}|${b.orderId}`;
      if(flaggedPairs.has(key))continue;
      flaggedPairs.add(key);
      const sameBuilding=a.center&&b.center&&a.center===b.center;
      const locNote=sameBuilding?`mismo edificio (${a.center})`:`${a.center||'—'} → ${b.center||'—'}`;
      alerts.push({type:'purple',msg:`Entregas próximas · ${fmtTime(a.deliveryAt)} y ${fmtTime(b.deliveryAt)} (${Math.round(gap/60000)} min) — ${a.customerName} / ${b.customerName} · ${locNote} · verificar personal disponible`});
    }
  }

  return alerts;
}

function renderAlerts(alerts){
  if(!alerts.length)return'';
  const cls=a=>a.type==='new'?'new':a.type==='red'?'red':a.type==='purple'?'purple':'amber';
  const icon=a=>a.type==='new'?ICON_OK:a.type==='red'?ICON_WARN:ICON_INFO;
  return`<div class="alerts">${alerts.map(a=>`<div class="alert alert-${cls(a)}">${icon(a)}<span>${a.msg}</span></div>`).join('')}</div>`;
}

function renderKPIs(orders,config){
  const active=orders.filter(o=>o.orderStatus!=='CANCELADO');
  const cancelled=orders.filter(o=>o.orderStatus==='CANCELADO');
  const totalPax=active.reduce((s,o)=>s+(o.pax||0),0);
  const totalPrice=active.reduce((s,o)=>s+(o.priceTotal||0),0);
  const withComment=active.filter(o=>o.userComment||o.internalComment);
  const paxClass=totalPax>=config.paxAlertDayTotal?'alert':totalPax>=config.paxAlertDayTotal*.75?'warn':'';
  return`<div class="kpi-grid">
    <div class="kpi-card"><div class="kpi-label">Servicios</div><div class="kpi-value">${active.length}</div><div class="kpi-sub">${cancelled.length>0?cancelled.length+' cancelado'+(cancelled.length>1?'s':''):'ninguno cancelado'}</div></div>
    <div class="kpi-card"><div class="kpi-label">Total pax</div><div class="kpi-value ${paxClass}">${totalPax}</div><div class="kpi-sub">${active.length?Math.round(totalPax/active.length)+' media por servicio':'—'}</div></div>
    <div class="kpi-card"><div class="kpi-label">Importe sin IVA</div><div class="kpi-value">${fmtMoney(totalPrice)}</div><div class="kpi-sub">servicios activos</div></div>
    <div class="kpi-card"><div class="kpi-label">Con comentario</div><div class="kpi-value ${withComment.length>0?'warn':''}">${withComment.length}</div><div class="kpi-sub">${withComment.length>0?'revisar antes de entregar':'sin incidencias'}</div></div>
  </div>`;
}

function renderTimeline(orders){
  const active=orders.filter(o=>o.orderStatus!=='CANCELADO'&&toDate(o.deliveryAt)).sort((a,b)=>toDate(a.deliveryAt)-toDate(b.deliveryAt));
  if(!active.length)return'';
  const hours=active.map(o=>toDate(o.deliveryAt).getHours());
  const minH=Math.max(0,Math.min(...hours));
  const maxH=Math.min(23,Math.max(...hours)+2);
  const totalMinutes=(maxH-minH)*60||60;
  const overlapIds=new Set();
  for(let i=0;i<active.length;i++){for(let j=i+1;j<active.length;j++){
    const a=active[i],b=active[j];
    if(a.room&&b.room&&a.room.toLowerCase()===b.room.toLowerCase()&&a.building?.toLowerCase()===b.building?.toLowerCase()){
      const aT=toDate(a.deliveryAt),bT=toDate(b.deliveryAt);
      if(Math.abs(aT-bT)<60*60*1000){overlapIds.add(a.orderId);overlapIds.add(b.orderId);}
    }
  }}
  const rows=active.map(o=>{
    const d=toDate(o.deliveryAt);
    const minutesFromStart=(d.getHours()-minH)*60+d.getMinutes();
    const leftPct=(minutesFromStart/totalMinutes*100);
    const widthPct=Math.max(10,Math.min(28,(45/totalMinutes*100)));
    const cls=[typeClass(o),overlapIds.has(o.orderId)?'overlap':''].filter(Boolean).join(' ');
    const label=`${o.customerName} · ${o.cateringType||'Otros'} · ${o.room||o.buildingRoom} · ${o.pax} pax`;
    return`<div class="tl-row"><span class="tl-time">${fmtTime(o.deliveryAt)}</span><div class="tl-track"><div class="tl-bar ${cls}" style="left:${leftPct.toFixed(2)}%;width:${widthPct.toFixed(1)}%" title="${label}">${label}</div></div></div>`;
  }).join('');
  let axisTicks='';
  for(let h=minH;h<=maxH;h++){
    const leftPct=((h-minH)*60/totalMinutes*100);
    axisTicks+=`<span class="tl-hour" style="position:absolute;left:${leftPct.toFixed(2)}%">${String(h).padStart(2,'0')}:00</span>`;
  }
  return`<p class="section-label">Línea de tiempo</p><div class="timeline-wrap"><div class="tl-rows">${rows}</div><div class="tl-axis"><span class="tl-time" style="flex-shrink:0"></span><div style="position:relative;flex:1;height:16px">${axisTicks}</div></div></div>`;
}

function renderOrderCard(o,showNew=true){
  const isCancelled=o.orderStatus==='CANCELADO';
  const hasComment=!!(o.userComment||o.internalComment);
  const isPendingReview=o.isNew&&!o.reviewed;
  const classes=['order-card'];
  if(isCancelled)classes.push('cancelled');
  if(hasComment)classes.push('has-comment');
  if(isPendingReview&&showNew)classes.push('is-new');
  let paxPill='';
  if(!isCancelled&&o.pax){
    if(o.pax>=50)paxPill=`<span class="pill pill-pax-red">${o.pax} pax</span>`;
    else if(o.pax>=35)paxPill=`<span class="pill pill-pax-amber">${o.pax} pax</span>`;
  }
  const newBadge=(isPendingReview&&showNew)?`<span class="pill pill-new">Nuevo</span>`:'';
  const reviewBtn=(isPendingReview&&showNew)?`<button onclick="markReviewed('${o.orderId}')" class="pill" style="background:var(--bg-hover);color:var(--text-secondary);border:1px solid var(--border);cursor:pointer" title="Marcar como revisado">✓ Revisar</button>`:'';
  const loc=[o.building,o.floor,o.room?`Sala ${o.room}`:''].filter(Boolean).join(' · ')||o.buildingRoom||'—';
  const teardown=o.teardownTime?` – ${o.teardownTime}`:'';
  const pickupInfo=o.pickupTime?`<span class="meta-item">📦 Recogida: ${o.pickupTime}</span>`:'';
  const prices=[];
  if(o.priceFood)prices.push(`Alim. ${fmtMoney(o.priceFood)}`);
  if(o.priceDrinks)prices.push(`Beb. ${fmtMoney(o.priceDrinks)}`);
  if(o.priceTransport)prices.push(`Transp. ${fmtMoney(o.priceTransport)}`);
  if(o.priceStaff)prices.push(`Cam. ${fmtMoney(o.priceStaff)}`);
  const priceDetail=prices.length?`<span class="meta-item" title="${prices.join(' | ')}">${fmtMoney(o.priceTotal)}</span>`:'';
  return`<div class="${classes.join(' ')}">
    <div class="order-top">
      <div class="order-who"><span class="order-name">${o.customerName||'—'}</span><span class="order-loc">Nº ${o.orderId} · ${loc}</span></div>
      <div class="order-pills">${newBadge}${reviewBtn}${typePill(o)}${paxPill}${statusPill(o)}${o.isLate?`<span class="pill pill-pax-red">⚑ ${o.lateMinutes?o.lateMinutes+' min':'Tarde'}</span>`:''}</div>
    </div>
    <div class="order-meta">
      ${o.deliveryAt?`<span class="meta-item">🕐 ${fmtTime(o.deliveryAt)}${teardown}</span>`:''}
      ${o.pax&&!paxPill?`<span class="meta-item">👥 ${o.pax} pax</span>`:''}
      ${pickupInfo}
      ${priceDetail}
      ${o.company?`<span class="meta-item" style="color:var(--text-tertiary)">${o.company}</span>`:''}
      ${o.hasDeliveryPhoto?`<span class="photo-dot"><span class="dot dot-yes"></span> foto entrega</span>`:''}

async function renderToday(container,now=new Date()){

async function renderWeek(container,now=new Date()){

  const byDay={};
  orders.forEach(o=>{const d=toDate(o.deliveryAt);if(!d)return;const key=localISODate(d);if(!byDay[key])byDay[key]=[];byDay[key].push(o);});
  const active=orders.filter(o=>o.orderStatus!=='CANCELADO');
  const totalPax=active.reduce((s,o)=>s+(o.pax||0),0);
  const totalPrice=active.reduce((s,o)=>s+(o.priceTotal||0),0);
  const cancelled=orders.filter(o=>o.orderStatus==='CANCELADO');

    <div class="kpi-card"><div class="kpi-label">Importe sin IVA</div><div class="kpi-value">${fmtMoney(totalPrice)}</div></div>
    <div class="kpi-card"><div class="kpi-label">Con comentarios</div><div class="kpi-value ${withComment.length>0?'warn':''}">${withComment.length}</div></div>

      const loc=[o.building,o.floor,o.room?`Sala ${o.room}`:''].filter(Boolean).join(' · ')||o.buildingRoom||'';
      html+=`<div class="order-card has-comment">
        <div class="order-top">
          <div class="order-who"><span class="order-name">${o.customerName}</span><span class="order-loc">${loc} · ${fmtTime(o.deliveryAt)}</span></div>
          <div class="order-pills">${typePill(o)}</div>
        </div>
        ${o.userComment?`<div class="comment-box">💬 ${o.userComment}</div>`:''}
        ${o.internalComment?`<div class="comment-internal">📋 ${o.internalComment}</div>`:''}
        ${o.billingNotes?`<div class="comment-internal">🧾 ${o.billingNotes}</div>`:''}
      </div>`;
    });
    html+='</div>';
  }

  // Pedidos por día
  const todayKey=localISODate(now);
  html+=`<p class="section-label">Pedidos por día</p><div class="period-grid">`;
  Object.keys(byDay).sort().forEach(key=>{
    const dayOrders=byDay[key];
    const dayActive=dayOrders.filter(o=>o.orderStatus!=='CANCELADO');
    const dayPax=dayActive.reduce((s,o)=>s+(o.pax||0),0);
    const dayPrice=dayActive.reduce((s,o)=>s+(o.priceTotal||0),0);
    const label=fmtDateShort(new Date(key+'T12:00:00'));

    html+=`<div class="period-day">
      <div class="period-day-header" onclick="this.nextElementSibling.classList.toggle('collapsed')">

}

async function renderMonth(container,now=new Date()){
  const[orders,config]=await Promise.all([getOrders({from:startOfMonth(now),to:endOfMonth(now)}),getConfig()]);
  if(!orders.length){container.innerHTML=`<div class="empty-state"><p>Sin pedidos este mes</p></div>`;return;}
  const active=orders.filter(o=>o.orderStatus!=='CANCELADO');
  const cancelled=orders.filter(o=>o.orderStatus==='CANCELADO');
  const totalPax=active.reduce((s,o)=>s+(o.pax||0),0);
  const totalPrice=active.reduce((s,o)=>s+(o.priceTotal||0),0);

  // Group by week
  const byWeek={};
  orders.forEach(o=>{
    const d=toDate(o.deliveryAt);if(!d)return;
    const ws=startOfWeek(d);
    const key=localISODate(ws);
    if(!byWeek[key])byWeek[key]=[];
    byWeek[key].push(o);
  });

  // Generar TODAS las semanas del calendario que tocan este mes, aunque estén vacías
  const monthStart=startOfMonth(now),monthEnd=endOfMonth(now);
  const allWeekKeys=[];
  let cursor=startOfWeek(monthStart);
  while(cursor<=monthEnd){
    allWeekKeys.push(localISODate(cursor));
    cursor=new Date(cursor);cursor.setDate(cursor.getDate()+7);
  }

  let html=`<div class="kpi-grid">
    <div class="kpi-card"><div class="kpi-label">Servicios mes</div><div class="kpi-value">${active.length}</div><div class="kpi-sub">${cancelled.length} cancelados</div></div>
    <div class="kpi-card"><div class="kpi-label">Total pax</div><div class="kpi-value">${totalPax}</div></div>
    <div class="kpi-card"><div class="kpi-label">Importe sin IVA</div><div class="kpi-value">${fmtMoney(totalPrice)}</div></div>
    <div class="kpi-card"><div class="kpi-label">Semanas con servicio</div><div class="kpi-value">${Object.keys(byWeek).length}</div></div>
  </div><div class="period-grid">`;

  allWeekKeys.forEach(key=>{
    const weekOrders=byWeek[key]||[];
    const weekActive=weekOrders.filter(o=>o.orderStatus!=='CANCELADO');
    const weekPax=weekActive.reduce((s,o)=>s+(o.pax||0),0);
    const weekPrice=weekActive.reduce((s,o)=>s+(o.priceTotal||0),0);
    const ws=new Date(key+'T12:00:00');
    const we=new Date(ws);we.setDate(we.getDate()+4);
    const label=`${ws.toLocaleDateString('es-ES',{day:'numeric',month:'short'})} – ${we.toLocaleDateString('es-ES',{day:'numeric',month:'short'})}`;
    const weekHasAlert=weekActive.some(o=>o.pax>=config.paxAlertIndividual||o.userComment||o.internalComment);
    const isEmpty=weekOrders.length===0;
    html+=`<div class="period-day">
      <div class="period-day-header" onclick="this.nextElementSibling.classList.toggle('collapsed')" style="${isEmpty?'opacity:.5':''}">
        <span class="period-day-title">Semana ${label}${weekHasAlert?' <span style="color:#C45A00;font-size:11px">⚑</span>':''}</span>
        <span class="period-day-meta">${isEmpty?'<span>sin pedidos</span>':`<span>${weekActive.length} servicios</span><span>${weekPax} pax</span><span>${fmtMoney(weekPrice)}</span>`}</span>
      </div>
      <div class="period-day-body collapsed">${weekOrders.length?weekOrders.map(o=>renderOrderCard(o,false)).join(''):'<div style="padding:8px 0;font-size:12px;color:var(--text-tertiary)">Sin pedidos esta semana</div>'}</div>
    </div>`;
  });
  html+='</div>';
  container.innerHTML=html;
}

let cumulativeRange={type:'all',from:null,to:null,compare:false,refDate:new Date()};

function getRangeForType(type,refDate=new Date()){
  const d=new Date(refDate);
  if(type==='day')return{from:startOfDay(d),to:endOfDay(d)};
  if(type==='week')return{from:startOfWeek(d),to:endOfWeek(d)};
  if(type==='month')return{from:startOfMonth(d),to:endOfMonth(d)};
  if(type==='year')return{from:new Date(d.getFullYear(),0,1),to:new Date(d.getFullYear(),11,31,23,59,59,999)};
  return{from:null,to:null};
}

function getPreviousPeriod(type,from,to){
  const diff=to-from;
  if(type==='month'){
    const prevMonth=new Date(from);prevMonth.setMonth(prevMonth.getMonth()-1);
    return{from:startOfMonth(prevMonth),to:endOfMonth(prevMonth)};
  }
  if(type==='week'){
    const prevWeek=new Date(from);prevWeek.setDate(prevWeek.getDate()-7);
    return{from:startOfWeek(prevWeek),to:endOfWeek(prevWeek)};
  }
  if(type==='year'){
    return{from:new Date(from.getFullYear()-1,0,1),to:new Date(from.getFullYear()-1,11,31,23,59,59,999)};
  }
  // day or custom range: shift back by the same duration
  return{from:new Date(from.getTime()-diff-86400000),to:new Date(from.getTime()-86400000)};
}

function computeStats(orders){
  const active=orders.filter(o=>o.orderStatus!=='CANCELADO');
  return{
    count:active.length,
    pax:active.reduce((s,o)=>s+(o.pax||0),0),
    price:active.reduce((s,o)=>s+(o.priceTotal||0),0),
    active
  };
}

function compareBadge(current,previous){
  if(previous===0)return'';
  const diff=((current-previous)/previous*100);
  const cls=diff>2?'compare-up':diff<-2?'compare-down':'compare-flat';
  const arrow=diff>2?'↑':diff<-2?'↓':'→';
  return`<span class="compare-badge ${cls}">${arrow} ${Math.abs(diff).toFixed(0)}% vs anterior</span>`;
}

async function renderCumulative(container){
  const range=cumulativeRange;
  let from=range.from,to=range.to;
  if(range.type!=='all'&&range.type!=='custom'){
    const r=getRangeForType(range.type,range.refDate||new Date());
    from=r.from;to=r.to;
  }

  const allOrders=await getOrders();
  const orders=(from&&to)?allOrders.filter(o=>{const d=toDate(o.deliveryAt);return d&&d>=from&&d<=to;}):allOrders;
  const active=orders.filter(o=>o.orderStatus!=='CANCELADO');

  const showNav=(range.type!=='all'&&range.type!=='custom');
  let periodLabel='';
  if(showNav){
    if(range.type==='day')periodLabel=range.refDate.toLocaleDateString('es-ES',{day:'numeric',month:'long',year:'numeric'});
    else if(range.type==='week'){const ws=startOfWeek(range.refDate),we=endOfWeek(range.refDate);periodLabel=`${ws.toLocaleDateString('es-ES',{day:'numeric',month:'short'})} – ${we.toLocaleDateString('es-ES',{day:'numeric',month:'short'})}`;}
    else if(range.type==='month')periodLabel=range.refDate.toLocaleDateString('es-ES',{month:'long',year:'numeric'});
    else if(range.type==='year')periodLabel=String(range.refDate.getFullYear());
  }

  const controlsHtml=`<div class="cumulative-controls">
    <select class="range-select" id="rangeType">
      <option value="all" ${range.type==='all'?'selected':''}>Todo</option>
      <option value="day" ${range.type==='day'?'selected':''}>Día</option>
      <option value="week" ${range.type==='week'?'selected':''}>Semana</option>
      <option value="month" ${range.type==='month'?'selected':''}>Mes</option>
      <option value="year" ${range.type==='year'?'selected':''}>Año</option>
      <option value="custom" ${range.type==='custom'?'selected':''}>Rango personalizado</option>
    </select>
    ${showNav?`<div class="date-nav" style="margin:0">
      <button class="date-nav-btn" id="cumPrev">◀</button>
      <span class="date-nav-label" style="cursor:default">${periodLabel}</span>
      <button class="date-nav-btn" id="cumNext">▶</button>
    </div>`:''}
    <div class="range-inputs" id="customRangeInputs" style="display:${range.type==='custom'?'flex':'none'}">
      <input type="date" id="rangeFrom" value="${range.from?localISODate(range.from):''}">
      <span style="color:var(--text-tertiary);font-size:12px">a</span>
      <input type="date" id="rangeTo" value="${range.to?localISODate(range.to):''}">
    </div>
    <label class="range-compare-toggle"><input type="checkbox" id="compareToggle" ${range.compare?'checked':''}> Comparar con período anterior</label>
  </div>`;

  if(!active.length){container.innerHTML=controlsHtml+`<div class="empty-state"><p>Sin datos en este rango</p></div>`;bindCumulativeControls(container);return;}

  const totalPax=active.reduce((s,o)=>s+(o.pax||0),0);
  const totalPrice=active.reduce((s,o)=>s+(o.priceTotal||0),0);
  const totalFood=active.reduce((s,o)=>s+(o.priceFood||0),0);
  const totalDrink=active.reduce((s,o)=>s+(o.priceDrinks||0),0);
  const totalTrans=active.reduce((s,o)=>s+(o.priceTransport||0),0);
  const totalStaff=active.reduce((s,o)=>s+(o.priceStaff||0),0);

  // Comparativa
  let compareCount='',comparePax='',comparePrice='';
  if(range.compare&&from&&to){
    const prev=getPreviousPeriod(range.type,from,to);
    const prevOrders=allOrders.filter(o=>{const d=toDate(o.deliveryAt);return d&&d>=prev.from&&d<=prev.to;});
    const prevStats=computeStats(prevOrders);
    compareCount=compareBadge(active.length,prevStats.count);
    comparePax=compareBadge(totalPax,prevStats.pax);
    comparePrice=compareBadge(totalPrice,prevStats.price);
  }

  const byType={};
  active.forEach(o=>{const t=o.cateringType||'Otros';if(!byType[t])byType[t]={count:0,pax:0,price:0};byType[t].count++;byType[t].pax+=o.pax||0;byType[t].price+=o.priceTotal||0;});
  // Top clientes (por persona, no por empresa)
  const byCustomer={};
  active.forEach(o=>{const c=o.customerName||'Sin nombre';if(!byCustomer[c])byCustomer[c]={count:0,pax:0,price:0};byCustomer[c].count++;byCustomer[c].pax+=o.pax||0;byCustomer[c].price+=o.priceTotal||0;});

  // Top salas
  const byRoomStat={};
  active.forEach(o=>{const r=o.room||o.buildingRoom||'Sin sala';if(!byRoomStat[r])byRoomStat[r]={count:0,pax:0,price:0};byRoomStat[r].count++;byRoomStat[r].pax+=o.pax||0;byRoomStat[r].price+=o.priceTotal||0;});

  // Franja horaria
  const hourSlots=[
    {label:'Antes de las 9',test:h=>h<9},
    {label:'9-10h',test:h=>h>=9&&h<10},
    {label:'10-11h',test:h=>h>=10&&h<11},
    {label:'11-12h',test:h=>h>=11&&h<12},
    {label:'12-13h',test:h=>h>=12&&h<13},
    {label:'13-14h',test:h=>h>=13&&h<14},
    {label:'14-15h',test:h=>h>=14&&h<15},
    {label:'15-16h',test:h=>h>=15&&h<16},
    {label:'16h+',test:h=>h>=16},
  ];
  const byHour=hourSlots.map(slot=>({label:slot.label,count:0}));
  let noHourCount=0;
  active.forEach(o=>{
    const d=toDate(o.deliveryAt);
    if(!d){noHourCount++;return;}
    const h=d.getHours();
    const idx=hourSlots.findIndex(s=>s.test(h));
    if(idx>=0)byHour[idx].count++;else noHourCount++;
  });

  const maxTP=Math.max(...Object.values(byType).map(v=>v.pax))||1;
  const maxCustP=Math.max(...Object.values(byCustomer).map(v=>v.price))||1;
  const maxRoomC=Math.max(...Object.values(byRoomStat).map(v=>v.count))||1;
  const maxHourC=Math.max(...byHour.map(v=>v.count))||1;

  const typeRows=Object.entries(byType).sort((a,b)=>b[1].pax-a[1].pax).map(([t,v])=>`<div class="bar-row"><span class="bar-label" title="${t}">${t}</span><div class="bar-fill-wrap"><div class="bar-fill" style="width:${(v.pax/maxTP*100).toFixed(0)}%"></div></div><span class="bar-val">${v.pax} pax</span></div>`).join('');
  const custRows=Object.entries(byCustomer).sort((a,b)=>b[1].price-a[1].price).slice(0,10).map(([c,v])=>`<div class="bar-row"><span class="bar-label" title="${c}">${c}</span><div class="bar-fill-wrap"><div class="bar-fill" style="width:${(v.price/maxCustP*100).toFixed(0)}%"></div></div><span class="bar-val">${v.count} ped.</span></div>`).join('');
  const roomRows=Object.entries(byRoomStat).sort((a,b)=>b[1].count-a[1].count).slice(0,10).map(([r,v])=>`<div class="bar-row"><span class="bar-label" title="${r}">${r}</span><div class="bar-fill-wrap"><div class="bar-fill" style="width:${(v.count/maxRoomC*100).toFixed(0)}%"></div></div><span class="bar-val">${v.count} ped.</span></div>`).join('');
  const hourRows=byHour.map(v=>`<div class="bar-row"><span class="bar-label">${v.label}</span><div class="bar-fill-wrap"><div class="bar-fill" style="width:${(v.count/maxHourC*100).toFixed(0)}%"></div></div><span class="bar-val">${v.count}</span></div>`).join('')+(noHourCount>0?`<div class="bar-row"><span class="bar-label">Sin hora</span><div class="bar-fill-wrap"><div class="bar-fill" style="width:${(noHourCount/maxHourC*100).toFixed(0)}%"></div></div><span class="bar-val">${noHourCount}</span></div>`:'');

  // Cancelaciones
  const cancelledOrders=orders.filter(o=>o.orderStatus==='CANCELADO');
  const cancelledCount=cancelledOrders.length;
  const cancelRate=orders.length?(cancelledCount/orders.length*100):0;
  const lostValue=cancelledOrders.reduce((s,o)=>s+(o.priceTotal||0),0);
  const byCancelCustomer={};
  cancelledOrders.forEach(o=>{const c=o.customerName||'Sin nombre';if(!byCancelCustomer[c])byCancelCustomer[c]={count:0,value:0};byCancelCustomer[c].count++;byCancelCustomer[c].value+=o.priceTotal||0;});
  const maxCancelC=Math.max(...Object.values(byCancelCustomer).map(v=>v.count),1);
  const cancelCustomerRows=Object.entries(byCancelCustomer).sort((a,b)=>b[1].count-a[1].count).slice(0,10).map(([c,v])=>`<div class="bar-row"><span class="bar-label" title="${c}">${c}</span><div class="bar-fill-wrap"><div class="bar-fill" style="width:${(v.count/maxCancelC*100).toFixed(0)}%;background:var(--alert-red-border)"></div></div><span class="bar-val">${v.count} cancel.</span></div>`).join('');

  container.innerHTML=controlsHtml+`<div class="kpi-grid">
    <div class="kpi-card"><div class="kpi-label">Total servicios</div><div class="kpi-value">${active.length}</div><div class="kpi-sub">${compareCount}</div></div>
    <div class="kpi-card"><div class="kpi-label">Total pax</div><div class="kpi-value">${totalPax}</div><div class="kpi-sub">${comparePax}</div></div>
    <div class="kpi-card"><div class="kpi-label">Importe total sin IVA</div><div class="kpi-value">${fmtMoney(totalPrice)}</div><div class="kpi-sub">${comparePrice}</div></div>
    <div class="kpi-card"><div class="kpi-label">Media pax / servicio</div><div class="kpi-value">${Math.round(totalPax/active.length)}</div></div>
  </div>
  <p class="section-label">Cancelaciones</p>
  <div class="kpi-grid">
    <div class="kpi-card"><div class="kpi-label">Cateringes cancelados</div><div class="kpi-value alert">${cancelledCount}</div></div>
    <div class="kpi-card"><div class="kpi-label">Tasa de cancelación</div><div class="kpi-value">${cancelRate.toFixed(1)}%</div></div>
    <div class="kpi-card"><div class="kpi-label">Valor perdido (no facturado)</div><div class="kpi-value alert">${fmtMoney(lostValue)}</div></div>
  </div>
  <div class="stats-grid">
    <div class="stat-card"><h3>Quién cancela más (top 10)</h3><div class="bar-chart">${cancelCustomerRows||'<div style="font-size:12px;color:var(--text-tertiary)">Sin cancelaciones en este período</div>'}</div></div>
  </div>
  <div class="stats-grid">
    <div class="stat-card"><h3>Pax por tipo de servicio</h3><div class="bar-chart">${typeRows}</div></div>
    <div class="stat-card"><h3>Clientes que más consumen (top 10)</h3><div class="bar-chart">${custRows}</div></div>
    <div class="stat-card"><h3>Salas con más pedidos (top 10)</h3><div class="bar-chart">${roomRows}</div></div>
    <div class="stat-card"><h3>Demanda por franja horaria</h3><div class="bar-chart">${hourRows}</div></div>
    <div class="stat-card"><h3>Desglose de importes</h3><div class="bar-chart">

      <div class="bar-row"><span class="bar-label">Bebidas</span><div class="bar-fill-wrap"><div class="bar-fill" style="width:${totalPrice?(totalDrink/totalPrice*100).toFixed(0):0}%"></div></div><span class="bar-val">${fmtMoney(totalDrink)}</span></div>
      <div class="bar-row"><span class="bar-label">Transporte</span><div class="bar-fill-wrap"><div class="bar-fill" style="width:${totalPrice?(totalTrans/totalPrice*100).toFixed(0):0}%"></div></div><span class="bar-val">${fmtMoney(totalTrans)}</span></div>
      <div class="bar-row"><span class="bar-label">Camareros</span><div class="bar-fill-wrap"><div class="bar-fill" style="width:${totalPrice?(totalStaff/totalPrice*100).toFixed(0):0}%"></div></div><span class="bar-val">${fmtMoney(totalStaff)}</span></div>
    </div></div>
    <div class="stat-card"><h3>Resumen operativo</h3><div class="bar-chart">
      <div class="bar-row"><span class="bar-label">Con foto entrega</span><div class="bar-fill-wrap"><div class="bar-fill" style="width:${(active.filter(o=>o.hasDeliveryPhoto).length/active.length*100).toFixed(0)}%"></div></div><span class="bar-val">${active.filter(o=>o.hasDeliveryPhoto).length}</span></div>
      <div class="bar-row"><span class="bar-label">Con foto recogida</span><div class="bar-fill-wrap"><div class="bar-fill" style="width:${(active.filter(o=>o.hasPickupPhoto).length/active.length*100).toFixed(0)}%"></div></div><span class="bar-val">${active.filter(o=>o.hasPickupPhoto).length}</span></div>
      <div class="bar-row"><span class="bar-label">Con retraso</span><div class="bar-fill-wrap"><div class="bar-fill" style="width:${(active.filter(o=>o.isLate).length/active.length*100).toFixed(0)}%"></div></div><span class="bar-val">${active.filter(o=>o.isLate).length}</span></div>
      <div class="bar-row"><span class="bar-label">Con comentario</span><div class="bar-fill-wrap"><div class="bar-fill" style="width:${(active.filter(o=>o.userComment||o.internalComment).length/active.length*100).toFixed(0)}%"></div></div><span class="bar-val">${active.filter(o=>o.userComment||o.internalComment).length}</span></div>
    </div></div>
  </div>`;
  bindCumulativeControls(container);
}

function bindCumulativeControls(container){
  const sel=container.querySelector('#rangeType');
  const customInputs=container.querySelector('#customRangeInputs');
  const fromInput=container.querySelector('#rangeFrom');
  const toInput=container.querySelector('#rangeTo');
  const compareToggle=container.querySelector('#compareToggle');
  const cumPrev=container.querySelector('#cumPrev');
  const cumNext=container.querySelector('#cumNext');
  if(!sel)return;

  sel.addEventListener('change',()=>{
    cumulativeRange.type=sel.value;
    if(sel.value==='custom'){
      customInputs.style.display='flex';
      if(!cumulativeRange.from)cumulativeRange.from=startOfMonth(new Date());
      if(!cumulativeRange.to)cumulativeRange.to=endOfMonth(new Date());
    } else {
      customInputs.style.display='none';
      if(!cumulativeRange.refDate)cumulativeRange.refDate=new Date();
    }
    renderCumulative(container);
  });

  if(cumPrev)cumPrev.addEventListener('click',()=>{
    const d=new Date(cumulativeRange.refDate);
    if(cumulativeRange.type==='day')d.setDate(d.getDate()-1);
    else if(cumulativeRange.type==='week')d.setDate(d.getDate()-7);
    else if(cumulativeRange.type==='month')d.setMonth(d.getMonth()-1);
    else if(cumulativeRange.type==='year')d.setFullYear(d.getFullYear()-1);
    cumulativeRange.refDate=d;
    renderCumulative(container);
  });
  if(cumNext)cumNext.addEventListener('click',()=>{
    const d=new Date(cumulativeRange.refDate);
    if(cumulativeRange.type==='day')d.setDate(d.getDate()+1);
    else if(cumulativeRange.type==='week')d.setDate(d.getDate()+7);
    else if(cumulativeRange.type==='month')d.setMonth(d.getMonth()+1);
    else if(cumulativeRange.type==='year')d.setFullYear(d.getFullYear()+1);
    cumulativeRange.refDate=d;
    renderCumulative(container);
  });

  if(fromInput)fromInput.addEventListener('change',()=>{
    cumulativeRange.from=new Date(fromInput.value+'T00:00:00');
    renderCumulative(container);
  });
  if(toInput)toInput.addEventListener('change',()=>{
    cumulativeRange.to=new Date(toInput.value+'T23:59:59');
    renderCumulative(container);
  });
  if(compareToggle)compareToggle.addEventListener('change',()=>{
    cumulativeRange.compare=compareToggle.checked;
    renderCumulative(container);
  });
}

async function renderView(view,container,date=new Date()){
  container.innerHTML=`<div class="loading-state"><div class="spinner"></div><span>Cargando…</span></div>`;
  try{
    if(view==='today')await renderToday(container,date);
    else if(view==='week')await renderWeek(container,date);
    else if(view==='month')await renderMonth(container,date);
    else if(view==='logic')await renderLogic(container);
    else await renderCumulative(container);
  }catch(e){
    container.innerHTML=`<div class="empty-state"><p>Error al cargar: ${e.message}</p></div>`;
    console.error(e);
  }
}

async function renderLogic(container){
  const config=await getConfig();
  container.innerHTML=`
  <div class="logic-section">
    <h3>📋 Qué hace esta herramienta</h3>
    <p>Este panel analiza los pedidos de catering importados y detecta automáticamente situaciones que requieren atención: solapamientos, volúmenes altos de producción, y entregas que pueden necesitar personal adicional. El objetivo es que, de un vistazo, sepas dónde poner el foco cada día.</p>
  </div>

  <div class="logic-section">
    <h3>🔴 Alertas de volumen individual</h3>
    <div class="logic-rule"><span class="logic-rule-dot" style="background:var(--alert-amber-border)"></span><span class="logic-rule-text"><strong>Volumen elevado (ámbar):</strong> un servicio con ${config.paxAlertIndividual || 35}+ pax. Puede necesitar más atención en la preparación.</span></div>
    <div class="logic-rule"><span class="logic-rule-dot" style="background:var(--alert-red-border)"></span><span class="logic-rule-text"><strong>Montaje grande (rojo):</strong> un servicio con ${config.paxAlertHigh || 50}+ pax. Se recomienda valorar 2 personas para el montaje.</span></div>
  </div>

  <div class="logic-section">
    <h3>🔴 Alertas de carga acumulada del día</h3>
    <div class="logic-rule"><span class="logic-rule-dot" style="background:var(--alert-red-border)"></span><span class="logic-rule-text"><strong>Producción total alta:</strong> la suma de pax de todos los servicios activos del día supera ${config.paxAlertDayTotal || 100} pax.</span></div>
    <div class="logic-rule"><span class="logic-rule-dot" style="background:var(--alert-red-border)"></span><span class="logic-rule-text"><strong>Volumen de pedidos alto:</strong> hay ${config.serviceCountAlert || 15} o más servicios el mismo día, aunque cada uno sea pequeño. Muchos pedidos pequeños también consumen tiempo de personal y logística.</span></div>
  </div>

  <div class="logic-section">
    <h3>🔴 Solapamiento de sala</h3>
    <p>Dos servicios programados en la <strong>misma sala</strong> con menos de 60 minutos de diferencia entre sus horas de entrega. Esto es un conflicto real — la sala no puede atender dos eventos a la vez.</p>
  </div>

  <div class="logic-section">
    <h3>🟣 Entregas próximas (aunque no coincidan de sala)</h3>
    <p>Dos entregas programadas con menos de <strong>${config.minGapMinutes || 20} minutos</strong> de diferencia, sin importar si son en la misma sala o edificio. No es un conflicto directo, pero puede significar que el mismo personal tenga que cubrir ambas entregas casi a la vez — especialmente si son en edificios distintos y hay que desplazarse.</p>
  </div>

  <div class="logic-section">
    <h3>🟢 Pedidos nuevos</h3>
    <p>Cuando importas un CSV, el sistema compara los pedidos por su <strong>Id de pedido</strong>. Si no existía antes, se marca como "Nuevo" con borde verde — así detectas rápidamente qué ha cambiado desde la última importación, sin tener que revisar todo el listado otra vez.</p>
  </div>

  <div class="logic-section">
    <h3>📷 Fotos de entrega y recogida</h3>
    <p>Solo se muestra si existe o no la foto (sí/no) — no se descarga ni almacena la imagen en sí, para no sobrecargar la herramienta. Útil para hacer seguimiento de qué pedidos están completamente cerrados.</p>
  </div>

  <div class="logic-section">
    <h3>📊 Vista Acumulado</h3>
    <p>Permite elegir un rango de fechas (día, semana, mes, año o personalizado) y compararlo con el período anterior equivalente. Las flechas ↑↓ indican si ha subido o bajado respecto al período de comparación.</p>
  </div>

  <div class="logic-section">
    <h3>⚙️ Cómo cambiar estos umbrales</h3>
    <p>Estos valores están pensados como punto de partida razonable. Si con el uso diario ves que deberían ser distintos (por ejemplo, que el aviso de volumen salte antes o después), se pueden ajustar en la configuración del sistema.</p>
  </div>`;
}

// ── NAVEGADOR DE FECHAS ───────────────────────────────────────────
let selectedDate = new Date();

function updateDateLabel(){
  const view=currentView;
  const label=document.getElementById('dateNavLabel');
  const now=new Date();
  const isToday=selectedDate.toDateString()===now.toDateString();
  if(view==='today'){
    label.textContent=isToday?'hoy':selectedDate.toLocaleDateString('es-ES',{day:'numeric',month:'short'});
  } else if(view==='week'){
    const ws=startOfWeek(selectedDate),we=endOfWeek(selectedDate);
    const wsStr=ws.toLocaleDateString('es-ES',{day:'numeric',month:'short'});
    const weStr=we.toLocaleDateString('es-ES',{day:'numeric',month:'short'});
    label.textContent=`${wsStr} – ${weStr}`;
  } else if(view==='month'){
    label.textContent=selectedDate.toLocaleDateString('es-ES',{month:'long',year:'numeric'});
  } else {
    label.textContent='todo';
  }
}

document.getElementById('btnPrev').addEventListener('click',()=>{
  if(currentView==='today')selectedDate.setDate(selectedDate.getDate()-1);
  else if(currentView==='week')selectedDate.setDate(selectedDate.getDate()-7);
  else if(currentView==='month')selectedDate.setMonth(selectedDate.getMonth()-1);
  selectedDate=new Date(selectedDate);
  updateDateLabel();
  renderView(currentView,mainContent,selectedDate);
});

document.getElementById('btnNext').addEventListener('click',()=>{
  if(currentView==='today')selectedDate.setDate(selectedDate.getDate()+1);
  else if(currentView==='week')selectedDate.setDate(selectedDate.getDate()+7);
  else if(currentView==='month')selectedDate.setMonth(selectedDate.getMonth()+1);
  selectedDate=new Date(selectedDate);
  updateDateLabel();
  renderView(currentView,mainContent,selectedDate);
});

document.getElementById('dateNavLabel').addEventListener('click',()=>{
  const input=document.getElementById('datePickerInput');
  if(!input)return;
  input.value=localISODate(selectedDate);
  try{input.showPicker();}catch(e){}
  input.addEventListener('change',function handler(){
    if(this.value){selectedDate=new Date(this.value+'T12:00:00');updateDateLabel();renderView(currentView,mainContent,selectedDate);}
    input.removeEventListener('change',handler);
  },{once:true});
});

// Import
const dropZone=document.getElementById('dropZone');
const fileInput=document.getElementById('fileInput');
const importPreview=document.getElementById('importPreview');
const importSummary=document.getElementById('importSummary');
const importNewList=document.getElementById('importNewList');
const importProgress=document.getElementById('importProgress');
const progressFill=document.getElementById('progressFill');
const progressText=document.getElementById('progressText');
const btnConfirm=document.getElementById('btnConfirmImport');
let pendingImport=null;

dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('dragover');});
dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('dragover');if(e.dataTransfer.files[0])handleFile(e.dataTransfer.files[0]);});
fileInput.addEventListener('change',e=>{if(e.target.files[0])handleFile(e.target.files[0]);});

async function handleFile(file){
  try{
    const text=await file.text();
    const orders=parseCSV(text);
    const existingIds=await getExistingOrderIds();
    const newOrders=orders.filter(o=>!existingIds.has(o.orderId));
    const updatedOrders=orders.filter(o=>existingIds.has(o.orderId));
    pendingImport={orders,newOrders,updatedOrders};
    importSummary.innerHTML=`<strong>${orders.length}</strong> pedidos en el archivo<br><span style="color:var(--ok-fg)">✓ ${newOrders.length} nuevos</span> &nbsp;·&nbsp; <span style="color:var(--text-secondary)">${updatedOrders.length} ya existentes (se actualizarán)</span>`;
    importNewList.innerHTML=newOrders.length>0?newOrders.map(o=>`<div class="import-new-item"><span>${o.customerName} · ${o.buildingRoom}</span><span>${o.deliveryAtISO?new Date(o.deliveryAtISO).toLocaleDateString('es-ES'):'—'}</span></div>`).join(''):'<div style="font-size:12px;color:var(--text-tertiary);padding:4px 0">No hay pedidos nuevos — solo actualizaciones</div>';
    importPreview.hidden=false;
  }catch(e){alert('Error al procesar el archivo: '+e.message);}
}

btnConfirm.addEventListener('click',async()=>{
  if(!pendingImport)return;
  btnConfirm.disabled=true;
  importPreview.hidden=true;
  importProgress.hidden=false;
  const newIds=new Set(pendingImport.newOrders.map(o=>o.orderId));
  let done=0;
  for(const order of pendingImport.orders){
    const isNew=newIds.has(order.orderId);
    const payload={...order,isNew};
    if(isNew)payload.reviewed=false;
    await saveOrder(payload);
    done++;
    const pct=Math.round(done/pendingImport.orders.length*100);
    progressFill.style.width=pct+'%';
    progressText.textContent=`Guardando… ${done} de ${pendingImport.orders.length}`;
  }
  await setDoc(doc(db,'catering_config','importInfo'),{lastImportAt:Timestamp.now(),lastImportCount:pendingImport.orders.length},{merge:true});
  await updateLastImportLabel();
  progressText.textContent='✓ Importación completada';
  setTimeout(()=>{importModal.hidden=true;resetImport();renderView(currentView,mainContent,selectedDate);},1200);
});

function resetImport(){
  pendingImport=null;importPreview.hidden=true;importProgress.hidden=true;
  progressFill.style.width='0%';progressText.textContent='Procesando…';
  btnConfirm.disabled=false;fileInput.value='';importNewList.innerHTML='';importSummary.innerHTML='';
}
